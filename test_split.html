<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body>
<pre id="out"></pre>
<script type="module">
const VOWEL_PHONEMES = [
  'iňź','e…™','a…™','…Ē…™','a ä','…™…ô','e…ô',' ä…ô',
  '…Ďňź','…Ēňź','uňź','…úňź',
  '…™','e','√¶',' Ć',' ä','…ô','…í','…Ē',
  'a','i','o','u'
];

function splitSyllables(word, phonetic) {
  if (!phonetic) return [{ letters: word, ipa: '' }];
  const stripped = phonetic.replace(/[\[\]\/]/g, '');
  const vowelUnits = [];
  let pos = 0;
  while (pos < stripped.length) {
    if (stripped[pos] === 'ňą' || stripped[pos] === 'ňĆ') { pos++; continue; }
    let matched = false;
    for (const vp of VOWEL_PHONEMES) {
      if (stripped.slice(pos, pos + vp.length) === vp) {
        vowelUnits.push({ ipa: vp, charPos: pos });
        pos += vp.length;
        matched = true;
        break;
      }
    }
    if (!matched) pos++;
  }
  if (vowelUnits.length === 0) return [{ letters: word, ipa: '' }];
  if (vowelUnits.length === 1) return [{ letters: word, ipa: phonetic }];

  const syllableIpas = [];
  let prevPos = 0;
  for (let i = 1; i < vowelUnits.length; i++) {
    const gapStart = vowelUnits[i-1].charPos + vowelUnits[i-1].ipa.length;
    const gapEnd = vowelUnits[i].charPos;
    const gap = stripped.slice(gapStart, gapEnd);
    const numCons = gap.replace(/[ňąňĆ]/g, '').length;
    if (numCons <= 1) {
      syllableIpas.push(stripped.slice(prevPos, gapStart));
      prevPos = gapStart;
    } else if (numCons === 2) {
      syllableIpas.push(stripped.slice(prevPos, gapStart + 1));
      prevPos = gapStart + 1;
    } else {
      syllableIpas.push(stripped.slice(prevPos, gapStart + Math.ceil(numCons / 2)));
      prevPos = gapStart + Math.ceil(numCons / 2);
    }
  }
  syllableIpas.push(stripped.slice(prevPos));

  const IPA_TO_LETTERS = {
    ' É': ['sh', 's', 'c', 'ch'],
    't É': ['ch', 'tch', 'tu'],
    'd í': ['j', 'g', 'dg', 'ge'],
    'Ňč': ['ng', 'n'],
    'őł': ['th'],
    '√į': ['th'],
    ' í': ['s', 'g', 'z'],
    'j': ['y', 'i', 'j'],
    'r': ['r', 'wr'],
    'w': ['w', 'u'],
    'h': ['h'],
    'l': ['l'],
    'm': ['m'],
    'n': ['n'],
    'f': ['f', 'ph', 'gh'],
    'v': ['v', 'f', 'ph'],
    's': ['s', 'c', 'ss'],
    'z': ['z', 's', 'x'],
    'p': ['p'],
    'b': ['b'],
    't': ['t', 'tt', 'ed'],
    'd': ['d', 'dd', 'ed'],
    'k': ['k', 'c', 'ck', 'ch', 'q'],
    'g': ['g', 'gg', 'gh'],
    '…°': ['g', 'gg', 'gh'],
    'x': ['x', 'ks'],
    '…ł': ['f', 'ph'],
    'ő≤': ['b', 'v'],
    '…£': ['g', 'y'],
  };
  const vowelMap = {
    'iňź': ['ee', 'ea', 'ie', 'i', 'e', 'ey', 'y'],
    '…™': ['i', 'y', 'e', 'u'],
    'e…™': ['a', 'ai', 'ay', 'ea', 'eigh', 'a_e', 'ei'],
    '√¶': ['a', 'ai'],
    '…Ďňź': ['a', 'ar', 'al'],
    '…í': ['o', 'a'],
    '…Ēňź': ['aw', 'a', 'or', 'al', 'au'],
    '…Ē': ['o', 'aw', 'a'],
    ' ä': ['oo', 'u', 'oul'],
    'uňź': ['oo', 'u', 'ou', 'ew', 'ue'],
    ' Ć': ['u', 'o', 'ou'],
    '…úňź': ['er', 'ir', 'ur', 'or', 'ear'],
    '…ô': [''],
    'a ä': ['ow', 'ou', 'ough'],
    '…ô ä': ['o', 'oa', 'ow', 'ou', 'o_e'],
    'a…™': ['i', 'y', 'ie', 'uy', 'eigh'],
    '…Ē…™': ['oy', 'oi', 'uy'],
    '…™…ô': ['ear', 'ere', 'eer'],
    'e…ô': ['air', 'are', 'ere', 'ayer'],
    ' ä…ô': ['oor', 'our', 'ure'],
    'a': ['a'], 'i': ['i', 'y'], 'o': ['o'], 'u': ['u', 'ou'], 'e': ['e', 'ea'],
  };

  function matchLettersToIpa(letters, pos, ipa) {
    const clean = ipa.replace(/[ňąňĆ]/g, '');
    if (!clean) return { matched: 0, ipa: '' };
    if (pos >= letters.length) return { matched: 0, ipa: '' };
    // IPAŤĺÖťü≥Ť°®
    const cMap = IPA_TO_LETTERS;
    if (cMap[clean]) {
      const cands = cMap[clean].filter(c => letters.slice(pos, pos + c.length).toLowerCase() === c)
        .sort((a, b) => b.length - a.length);
      if (cands.length > 0) return { matched: cands[0].length, ipa: clean };
    }
    // ŚÖÉťü≥Ť°®
    if (vowelMap[clean]) {
      const cands = vowelMap[clean].filter(c => letters.slice(pos, pos + c.length).toLowerCase() === c)
        .sort((a, b) => b.length - a.length);
      if (cands.length > 0) return { matched: cands[0].length, ipa: clean };
    }
    // ŚćēŚ≠óÁ¨¶IPA
    if (clean.length === 1) {
      const fc = clean[0];
      if ('pbtdkgfvőł√įsz Émnlryjwh'.includes(fc)) {
        if (letters[pos]?.toLowerCase() === fc) return { matched: 1, ipa: fc };
      }
      if (vowelMap[fc]) {
        const cands = vowelMap[fc].filter(c => letters.slice(pos, pos + c.length).toLowerCase() === c)
          .sort((a, b) => b.length - a.length);
        if (cands.length > 0) return { matched: cands[0].length, ipa: fc };
      }
    }
    return { matched: 0, ipa: '' };
  }

  function allocateByRules(letters, syllableIpas) {
    const result = [];
    let lPos = 0;
    for (let si = 0; si < syllableIpas.length; si++) {
      const ipa = syllableIpas[si].replace(/[ňąňĆ]/g, '');
      const syllLetters = [];
      let consumed = 0;
      while (consumed < ipa.length && lPos < letters.length) {
        const m = matchLettersToIpa(letters, lPos, ipa.slice(consumed));
        if (m.matched > 0) {
          syllLetters.push(letters.slice(lPos, lPos + m.matched));
          lPos += m.matched;
          consumed += m.ipa.length;
        } else {
          syllLetters.push(letters[lPos]);
          lPos++;
          consumed++;
        }
      }
      while (consumed < ipa.length && lPos < letters.length) {
        syllLetters.push(letters[lPos]);
        lPos++;
        consumed++;
      }
      result.push(syllLetters.join(''));
    }
    return result;
  }

  const wordLower = word.replace(/ /g, '').toLowerCase();
  let letterSyllables = allocateByRules(wordLower, syllableIpas);
  const totalAlloc = letterSyllables.join('').length;
  if (totalAlloc !== wordLower.length) {
    const ipaLengths = syllableIpas.map(ip => ip.replace(/[ňąňĆ]/g, '').length);
    const totalIpa = ipaLengths.reduce((a, b) => a + b, 0);
    if (totalIpa > 0) {
      let counts = ipaLengths.map(l => Math.round(l / totalIpa * wordLower.length));
      const diff = wordLower.length - counts.reduce((a, b) => a + b, 0);
      if (diff > 0) counts[counts.length - 1] += diff;
      if (diff < 0) counts[counts.length - 1] += diff;
      let wPos = 0;
      letterSyllables.length = 0;
      for (const cnt of counts) {
        letterSyllables.push(wordLower.slice(wPos, wPos + cnt));
        wPos += cnt;
      }
    }
  }
  return syllableIpas.map((ipa, i) => ({ letters: letterSyllables[i] || '', ipa: '/' + ipa + '/' }));
}

// Test cases
const tests = [
  // Problem words from before
  ['headache', '/ňąhede…™k/', 'hea|dache', 'hea|de…™k'],
  ['treasure', '/ňątre í…ô/', 'trea|sure', 'tre| í…ô'],
  ['Wednesday', '/ňąwenzde…™/', 'Wedn|esday', 'wen|zde…™'],
  ['sweater', '/ňąswet…ô/', 'swea|ter', 'swe|t…ô'],
  ['daugter', '/ňąd…Ēňźt…ô/', 'daugh|ter', 'd…Ēňź|t…ô'],
  ['daughter', '/ňąd…Ēňźt…ô/', 'daugh|ter', 'd…Ēňź|t…ô'],
  ['cooker', '/ňąk äk…ô/', 'coo|ker', 'k ä|k…ô'],
  ['library', '/ňąla…™br…ôri/', 'lib|rary', 'la…™b|r…ôri'],
  ['shoulder', '/ňą É…ô äld…ô/', 'shoul|der', ' É…ô äl|d…ô'],
  ['strawberry', '/ňąstr…Ēňźb…ôri/', 'straw|berry', 'str…Ēňź|b…ôri'],
  ['music', '/ňąmjuňźz…™k/', 'mus|ic', 'mjuňź|z…™k'],
  ['university', '/ňĆjuňźn…™ňąv…úňźs…ôti/', 'uni|ver|si|ty', 'juňź|n…™|v…úňź|s…ôti'],
  ['listen to music', '/ňąl…™s…ôn t…ô ňąmjuňźz…™k/', 'listen|to|music', 'l…™s…ôn|t…ô|mjuňźz…™k'],
  ['listen to a CD', '/ňąl…™s…ôn t…ô …ô siňź ňądiňź/', 'l|i|ste|n|to|a|CD', 'l…™|s…ôn|t…ô|…ô|siňź|ňądiňź'],
  ['watch a DVD', '/w…ít É …ô diňź viňź ňądiňź/', 'watch|a|DVD', 'w…ít É|…ô|diňź|viňź|ňądiňź'],
  ['go skating', '/…°…ô ä ňąske…™t…™Ňč/', 'go|skating', '…°…ô ä|ňąske…™t…™Ňč'],
  ['text', '/tekst/', 'text', 'tekst'],
  ['frightened', '/ňąfra…™tnd/', 'fright|ened', 'fra…™tnd'],
  ['jump', '/d í Ćmp/', 'jump', 'd í Ćmp'],
  ['cold', '/k…ô äld/', 'cold', 'k…ô äld'],
  ['fly', '/fla…™/', 'fly', 'fla…™'],
  ['world', '/w…úňźld/', 'world', 'w…úňźld'],
  ['cough', '/k…íf/', 'cough', 'k…íf'],
  ['threw', '/őłruňź/', 'threw', 'őłruňź'],
  ['caught', '/k…Ēňźt/', 'caught', 'k…Ēňźt'],
  ['taught', '/t…Ēňźt/', 'taught', 't…Ēňźt'],
  ['moustache', '/m…ôňąst…Ďňź É/', 'mou|stache', 'm…ôňą|st…Ďňź É'],
  ['skipped', '/sk…™pt/', 'skipped', 'sk…™pt'],
  ['science', '/ňąsa…™…ôns/', 'sci|ence', 'sa…™|…ôns'],
  ['scissors', '/ňąs…™z…ôz/', 'scis|sors', 's…™|z…ôz'],
  ['sand castle', '/s√¶nd ňąk…Ďňźs…ôl/', 'sand|castle', 's√¶nd|ňąk…Ďňźs…ôl'],
  ['world tour', '/w…úňźld t ä…ô/', 'world|tour', 'w…úňźld|t ä…ô'],
];

let out = '';
let pass = 0, fail = 0;
for (const [word, phonetic, expected, ipaExpected] of tests) {
  const result = splitSyllables(word, phonetic);
  const gotLetters = result.map(s => s.letters).join('|');
  const gotIpa = result.map(s => s.ipa).join('|');
  const allMatch = gotLetters === expected;
  const status = allMatch ? '‚úď' : '‚úó';
  if (allMatch) pass++; else fail++;
  out += `${status} ${word.padEnd(20)} ${phonetic}\n`;
  out += `  expected: ${expected}\n`;
  out += `  got:      ${gotLetters}\n`;
  if (!allMatch) out += `  ipa:      ${gotIpa}\n`;
  out += `\n`;
}
document.getElementById('out').textContent = out + `\nPass: ${pass}, Fail: ${fail}`;
</script>
</body>
</html>
